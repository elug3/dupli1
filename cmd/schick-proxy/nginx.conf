events {
    worker_connections 1024;
}

http {
    # Use Docker's embedded DNS resolver; re-resolve upstreams every 10 s.
    # This lets nginx start even when backends aren't up yet, and recover
    # automatically if they restart.
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Variables defer upstream DNS lookup to request time (required with resolver).
        set $auth    schick-auth:8080;
        set $product schick-product:8080;
        set $order   schick-order:8080;

        location = /health         { proxy_pass http://$auth; }
        location /api/v1/auth/     { proxy_pass http://$auth; }
        location /api/v1/checkout/ { proxy_pass http://$order; }
        location /api/v1/orders    { proxy_pass http://$order; }
        location /api/             { proxy_pass http://$product; }

        location = /gateway/health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
