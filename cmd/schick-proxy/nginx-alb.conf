events {
    worker_connections 1024;
}

http {
    # VPC DNS resolver (VPC CIDR base + 2).
    resolver 10.0.0.2 valid=10s;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        set $auth    auth.schick.local:8080;
        set $product product.schick.local:8080;

        location = /gateway/health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location = /health         { proxy_pass http://$auth; }
        location /api/v1/auth/     { proxy_pass http://$auth; }
        location /api/             { proxy_pass http://$product; }
    }
}
