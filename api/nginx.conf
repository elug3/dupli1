# Docker embedded DNS (127.0.0.11) + VPC Route53 resolver (10.0.0.2).
# Variable proxy_pass below re-resolves hostnames when containers restart.
resolver 127.0.0.11 10.0.0.2 valid=10s ipv6=off;

server {
    listen 80;
    server_name manage.dupli1.local;

    set $manage_upstream manage.dupli1.internal:3000;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://$manage_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80 default_server;
    client_max_body_size 20m;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /gateway/health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location /api/v1/auth/ {
        set $upstream http://dupli1-auth:8080;
        proxy_pass $upstream;
    }

    location /api/v1/products {
        set $upstream http://dupli1-product:8080;
        proxy_pass $upstream;
    }

    location /api/v1/variants {
        set $upstream http://dupli1-product:8080;
        proxy_pass $upstream;
    }

    location /api/v1/coupons {
        set $upstream http://dupli1-product:8080;
        proxy_pass $upstream;
    }

    location /api/v1/inventory/ {
        set $upstream http://dupli1-inventory:8080;
        proxy_pass $upstream;
    }

    location /api/v1/orders {
        set $upstream http://dupli1-order:8080;
        proxy_pass $upstream;
    }

    location /api/v1/checkout {
        set $upstream http://dupli1-order:8080;
        proxy_pass $upstream;
    }

    location /api/v1/cart {
        set $upstream http://dupli1-cart:8080;
        proxy_pass $upstream;
    }

    location /api/v1/carts/ {
        set $upstream http://dupli1-cart:8080;
        proxy_pass $upstream;
    }

    location /api/v1/payments {
        set $upstream http://dupli1-payment:8080;
        proxy_pass $upstream;
    }

    location /api/v1/payments/ {
        set $upstream http://dupli1-payment:8080;
        proxy_pass $upstream;
    }

    location /api/v1/notification/ {
        set $upstream http://dupli1-notification:8080;
        proxy_pass $upstream;
    }

    location /product-images/ {
        set $upstream http://minio:9000;
        proxy_pass $upstream;
    }
}
