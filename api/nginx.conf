upstream dupli1_auth {
    server dupli1-auth:8080;
}

upstream dupli1_product {
    server dupli1-product:8080;
}

upstream dupli1_inventory {
    server dupli1-inventory:8080;
}

upstream dupli1_order {
    server dupli1-order:8080;
}

upstream dupli1_notification {
    server dupli1-notification:8080;
}

# VPC DNS (Route53 resolver) for Cloud Map hostnames that change on redeploy.
resolver 10.0.0.2 valid=10s ipv6=off;

server {
    listen 80;
    server_name manage.dupli1.local;

    set $manage_upstream manage.dupli1.internal:3000;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://$manage_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80 default_server;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /gateway/health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location /api/v1/auth/ {
        proxy_pass http://dupli1_auth;
    }

    location /api/v1/products {
        proxy_pass http://dupli1_product;
    }

    location /api/v1/coupons {
        proxy_pass http://dupli1_product;
    }

    location /api/v1/inventory/ {
        proxy_pass http://dupli1_inventory;
    }

    location /api/v1/orders {
        proxy_pass http://dupli1_order;
    }

    location /api/v1/checkout {
        proxy_pass http://dupli1_order;
    }

    location /api/v1/notification/ {
        proxy_pass http://dupli1_notification;
    }
}
