upstream dupli1_auth {
    server dupli1-auth:8080;
}

upstream dupli1_product {
    server dupli1-product:8080;
}

upstream dupli1_inventory {
    server dupli1-inventory:8080;
}

upstream dupli1_order {
    server dupli1-order:8080;
}

server {
    listen 80;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /gateway/health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/v1/auth/ {
        proxy_pass http://dupli1_auth;
    }

    location /api/v1/products {
        proxy_pass http://dupli1_product;
    }

    location /api/v1/coupons {
        proxy_pass http://dupli1_product;
    }

    location /api/v1/inventory/ {
        proxy_pass http://dupli1_inventory;
    }

    location /api/v1/orders {
        proxy_pass http://dupli1_order;
    }

    location /api/v1/checkout {
        proxy_pass http://dupli1_order;
    }
}
