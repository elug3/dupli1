# Docker embedded DNS (127.0.0.11) + VPC Route53 resolver (10.0.0.2).
# Variable proxy_pass below re-resolves hostnames when containers restart.
resolver 127.0.0.11 10.0.0.2 valid=10s ipv6=off;

server {
    listen 80;
    server_name manage.dupli1.local;

    set $manage_upstream manage.dupli1.internal:3000;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://$manage_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80 default_server;
    client_max_body_size 20m;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    error_page 400 = @error_400;
    error_page 401 = @error_401;
    error_page 403 = @error_403;
    error_page 404 = @error_404;
    error_page 405 = @error_405;
    error_page 408 = @error_408;
    error_page 413 = @error_413;
    error_page 429 = @error_429;
    error_page 500 = @error_500;
    error_page 502 = @error_502;
    error_page 503 = @error_503;
    error_page 504 = @error_504;

    location @error_400 { default_type application/json; return 400 '{"error":"bad request"}'; }
    location @error_401 { default_type application/json; return 401 '{"error":"unauthorized"}'; }
    location @error_403 { default_type application/json; return 403 '{"error":"forbidden"}'; }
    location @error_404 { default_type application/json; return 404 '{"error":"not found"}'; }
    location @error_405 { default_type application/json; return 405 '{"error":"method not allowed"}'; }
    location @error_408 { default_type application/json; return 408 '{"error":"request timeout"}'; }
    location @error_413 { default_type application/json; return 413 '{"error":"payload too large"}'; }
    location @error_429 { default_type application/json; return 429 '{"error":"too many requests"}'; }
    location @error_500 { default_type application/json; return 500 '{"error":"internal server error"}'; }
    location @error_502 { default_type application/json; return 502 '{"error":"bad gateway"}'; }
    location @error_503 { default_type application/json; return 503 '{"error":"service unavailable"}'; }
    location @error_504 { default_type application/json; return 504 '{"error":"gateway timeout"}'; }

    location = /gateway/health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location /api/v1/auth/ {
        set $upstream http://dupli1-auth:8080;
        proxy_pass $upstream;
    }

    location /api/v1/products {
        set $upstream http://dupli1-product:8080;
        proxy_pass $upstream;
    }

    location /api/v1/variants {
        set $upstream http://dupli1-product:8080;
        proxy_pass $upstream;
    }

    location /api/v1/coupons {
        set $upstream http://dupli1-product:8080;
        proxy_pass $upstream;
    }

    location /api/v1/inventory/ {
        # Inventory merged into product; dupli1-inventory kept running,
        # unused, as an instant rollback path during the burn-in window.
        set $upstream http://dupli1-product:8080;
        proxy_pass $upstream;
    }

    location /api/v1/orders {
        set $upstream http://dupli1-order:8080;
        proxy_pass $upstream;
    }

    location /api/v1/checkout {
        set $upstream http://dupli1-order:8080;
        proxy_pass $upstream;
    }

    location /api/v1/cart {
        set $upstream http://dupli1-cart:8080;
        proxy_pass $upstream;
    }

    location /api/v1/carts/ {
        set $upstream http://dupli1-cart:8080;
        proxy_pass $upstream;
    }

    location /api/v1/payments {
        set $upstream http://dupli1-payment:8080;
        proxy_pass $upstream;
    }

    location /api/v1/payments/ {
        set $upstream http://dupli1-payment:8080;
        proxy_pass $upstream;
    }

    location /api/v1/notification/ {
        set $upstream http://dupli1-notification:8080;
        proxy_pass $upstream;
    }
}
