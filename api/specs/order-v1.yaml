openapi: 3.0.3
info:
  title: Dupli1 Order API
  version: v1
  description: |
    Private order lifecycle and checkout session API for the Dupli1 marketplace.

    **Authentication:** When `AUTH_JWKS_URL` or `JWT_SECRET` is configured, protected routes require
    `Authorization: Bearer <access_token>` (RS256 via auth JWKS when `AUTH_JWKS_URL` is set;
    HS256 via `JWT_SECRET` in dev). The token must include claim `"type": "access"`.

    **Roles:** `customer`, `order_manager`, `admin`. Order CRUD enforces ABAC for customers;
    checkout session endpoints do not verify `customer_id` against the JWT subject.

    **Persistence:** In-memory only — data is lost on service restart.

servers:
  - url: http://localhost:8080
    description: Local nginx gateway
  - url: http://localhost:8083
    description: Direct dupli1-order service

tags:
  - name: Health
  - name: Settings
  - name: Orders
  - name: Checkout

paths:
  /api/v1/orders/health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: orderHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/orders/settings:
    get:
      tags: [Settings]
      summary: Non-secret service settings
      operationId: orderSettings
      responses:
        '200':
          description: Safe operational settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'

  /api/v1/orders:
    post:
      tags: [Orders]
      summary: Create an order
      operationId: orderCreate
      security:
        - bearerAuth: []
      description: |
        Reserves inventory and persists the order in `pending` status.
        Customers may only set `customer_id` equal to their JWT subject.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags: [Orders]
      summary: List orders for a customer
      operationId: orderList
      security:
        - bearerAuth: []
      description: Customers may only list orders for their own `customer_id`.
      parameters:
        - name: customer_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/orders/{id}:
    get:
      tags: [Orders]
      summary: Get an order by ID
      operationId: orderGet
      security:
        - bearerAuth: []
      description: Customers may only read orders they own.
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/orders/{id}/status:
    put:
      tags: [Orders]
      summary: Update order status
      operationId: orderUpdateStatus
      security:
        - bearerAuth: []
      description: |
        Requires `order_manager` or `admin` role.

        Valid transitions:
        - `pending` → `confirmed` (commits inventory reservation)
        - `pending` → `canceled` (releases reservation)
        - `confirmed` → `fulfilled`
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: Updated order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/checkout/sessions:
    post:
      tags: [Checkout]
      summary: Create a checkout session
      operationId: checkoutCreateSession
      security:
        - bearerAuth: []
      description: Creates an empty session with a 30-minute TTL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id]
              properties:
                customer_id:
                  type: string
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/checkout/sessions/{id}:
    get:
      tags: [Checkout]
      summary: Get a checkout session
      operationId: checkoutGetSession
      security:
        - bearerAuth: []
      description: Expired open sessions are marked `expired` on read.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Checkout session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/checkout/sessions/{id}/items:
    put:
      tags: [Checkout]
      summary: Replace all line items
      operationId: checkoutSetItems
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/OrderItem'
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Checkout]
      summary: Add or update a single line item
      operationId: checkoutUpsertItem
      security:
        - bearerAuth: []
      description: Matches existing items by `sku`.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderItem'
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/checkout/sessions/{id}/items/{sku}:
    delete:
      tags: [Checkout]
      summary: Remove a line item by SKU
      operationId: checkoutRemoveItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - name: sku
          in: path
          required: true
          schema:
            type: string
          example: BOT-001
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/checkout/sessions/{id}/coupon:
    post:
      tags: [Checkout]
      summary: Apply a coupon to the session
      operationId: checkoutApplyCoupon
      security:
        - bearerAuth: []
      description: Redeems the coupon via the product service (`DUPLI1_PRODUCT_URL`).
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  example: SUMMER30
      responses:
        '200':
          description: Updated session with discount applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/checkout/sessions/{id}/complete:
    post:
      tags: [Checkout]
      summary: Complete checkout and create an order
      operationId: checkoutComplete
      security:
        - bearerAuth: []
      description: Reserves inventory, creates a `pending` order, and marks the session `completed`.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Checkout completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteCheckoutResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 access token via auth JWKS when AUTH_JWKS_URL is set, or HS256 via JWT_SECRET in dev

  parameters:
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: ord_000001
    SessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: cs_000001

  schemas:
    Settings:
      type: object
      required: [service, api_version]
      properties:
        service:
          type: string
          example: order
        api_version:
          type: string
          example: v1
        auth:
          type: object
          properties:
            mode:
              type: string
            jwks_configured:
              type: boolean
            jwt_secret_fallback:
              type: boolean
        storage:
          type: string
        features:
          type: object
          additionalProperties:
            type: boolean
        limits:
          type: object
          additionalProperties: true
        dependencies:
          type: object
          additionalProperties:
            type: object
            properties:
              configured:
                type: boolean
              host:
                type: string

    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: integer

    OrderStatus:
      type: string
      enum: [pending, confirmed, canceled, fulfilled]

    CheckoutSessionStatus:
      type: string
      enum: [open, completed, expired]

    OrderItem:
      type: object
      required: [sku, quantity, unit_price_cents]
      properties:
        sku:
          type: string
          example: BOT-001
        quantity:
          type: integer
          minimum: 1
        unit_price_cents:
          type: integer
          format: int64
          description: Unit price in whole KRW won (Stripe minor units for krw; do not multiply product.price by 100)
          minimum: 0
          example: 2890000

    Order:
      type: object
      required:
        - id
        - customer_id
        - reservation_id
        - items
        - status
        - subtotal_cents
        - discount_cents
        - total_cents
        - created_at
        - updated_at
      properties:
        id:
          type: string
        customer_id:
          type: string
        reservation_id:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        status:
          $ref: '#/components/schemas/OrderStatus'
        coupon_code:
          type: string
        subtotal_cents:
          type: integer
          format: int64
        discount_cents:
          type: integer
          format: int64
        total_cents:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateOrderRequest:
      type: object
      required: [customer_id, items]
      properties:
        customer_id:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'

    OrderListResponse:
      type: object
      required: [total, orders]
      properties:
        total:
          type: integer
        orders:
          type: array
          items:
            $ref: '#/components/schemas/Order'

    CheckoutSession:
      type: object
      required:
        - id
        - customer_id
        - items
        - status
        - subtotal_cents
        - discount_cents
        - total_cents
        - expires_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
        customer_id:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        status:
          $ref: '#/components/schemas/CheckoutSessionStatus'
        coupon_code:
          type: string
        subtotal_cents:
          type: integer
          format: int64
        discount_cents:
          type: integer
          format: int64
        total_cents:
          type: integer
          format: int64
        order_id:
          type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CompleteCheckoutResult:
      type: object
      required: [session, order]
      properties:
        session:
          $ref: '#/components/schemas/CheckoutSession'
        order:
          $ref: '#/components/schemas/Order'

  responses:
    BadRequest:
      description: Invalid request or invalid transition
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient role or ABAC violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
