openapi: 3.0.3
info:
  title: Dupli1 Auth API
  version: v1
  description: |
    Private authentication and user administration API for the Dupli1 marketplace.

    **Token flow**
    1. `POST /login` → `refresh_token` (RS256 JWT, ~24h)
    2. `POST /refresh` → `token` (access JWT, ~15min)
    3. Send `Authorization: Bearer <token>` on protected routes

    Access tokens are RS256 JWTs verifiable via `GET /.well-known/jwks.json`.

servers:
  - url: http://localhost:8080
    description: Local nginx gateway
  - url: http://localhost:18080
    description: Direct dupli1-auth service

tags:
  - name: Health
  - name: Tokens
  - name: Users

paths:
  /api/v1/auth/health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: authHealth
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /api/v1/auth/.well-known/jwks.json:
    get:
      tags: [Tokens]
      summary: JSON Web Key Set for access token verification
      operationId: authJWKS
      responses:
        '200':
          description: JWKS document
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      type: object
        '404':
          description: JWKS not configured (test-only edge case)

  /api/v1/auth/login:
    post:
      tags: [Tokens]
      summary: Authenticate and receive a refresh token
      operationId: authLogin
      description: Rate limited to 10 requests per 60 seconds per client IP when Redis is available.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Account locked or deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/refresh:
    post:
      tags: [Tokens]
      summary: Exchange refresh token for access token
      operationId: authRefresh
      description: Rate limited to 30 requests per 60 seconds per client IP when Redis is available.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/logout:
    post:
      tags: [Tokens]
      summary: Revoke a refresh token
      operationId: authLogout
      description: |
        Authenticates via `refresh_token` in the request body (no Bearer header).
        Access tokens remain valid until they expire.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Logout successful
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/register:
    post:
      tags: [Users]
      summary: Create a new user account
      operationId: authRegister
      security:
        - bearerAuth: []
      description: Requires `admin`, `user_manager`, or `customer_registrar` role. New users receive the `customer` role by default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Invalid email or weak password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/me:
    get:
      tags: [Users]
      summary: Get authenticated user profile
      operationId: authMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/users:
    get:
      tags: [Users]
      summary: List all users
      operationId: authListUsers
      security:
        - bearerAuth: []
      description: Requires `admin` role.
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/users/{id}/roles:
    patch:
      tags: [Users]
      summary: Replace a user's roles
      operationId: authSetUserRoles
      security:
        - bearerAuth: []
      description: Requires `admin` role.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roles]
              properties:
                roles:
                  type: array
                  items:
                    type: string
                  example: [customer, user_manager]
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/users/{id}/password:
    patch:
      tags: [Users]
      summary: Set a user's password
      operationId: authUpdateUserPassword
      security:
        - bearerAuth: []
      description: Requires `admin` or `user_manager` role.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 8
      responses:
        '204':
          description: Password updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Password too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/users/{id}/status:
    patch:
      tags: [Users]
      summary: Activate or deactivate a user
      operationId: authSetUserStatus
      security:
        - bearerAuth: []
      description: Requires `admin` or `user_manager` role.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_active:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 access token from POST /api/v1/auth/refresh

  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Target user UUID

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    RegisterResponse:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    RefreshTokenResponse:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AccessTokenResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    User:
      type: object
      required: [user_id, email, roles, is_active, failed_login_attempts]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [admin, user_manager, customer_registrar, customer, owner, product_manager]
        is_active:
          type: boolean
        locked_at:
          type: string
          format: date-time
          nullable: true
        failed_login_attempts:
          type: integer

  responses:
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing, invalid, or expired token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
