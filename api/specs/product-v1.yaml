openapi: 3.0.3
info:
  title: Dupli1 Product API
  version: v1
  description: |
    Private product catalog and coupon API for the Dupli1 marketplace.

    Protected routes require a Bearer access token (RS256 via auth JWKS when AUTH_JWKS_URL is set,
    or HS256 via JWT_SECRET in dev). The token must include claim "type": "access".

    **Roles:** `product_manager`, `admin`, `owner`. Product and coupon management routes return
    `403` when the token is valid but lacks one of these roles.

servers:
  - url: http://localhost:8080
    description: Local nginx gateway
  - url: http://localhost:8081
    description: Direct dupli1-product service

tags:
  - name: Health
  - name: Settings
  - name: Products
  - name: Coupons

paths:
  /api/v1/products/health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: productHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/products/settings:
    get:
      tags: [Settings]
      summary: Non-secret service settings
      operationId: productSettings
      responses:
        '200':
          description: Safe operational settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'

  /api/v1/inventory/settings:
    get:
      tags: [Settings]
      summary: Non-secret service settings (product service)
      operationId: inventorySettings
      responses:
        '200':
          description: Safe operational settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'

  /api/v1/products/{id}:
    get:
      tags: [Products]
      summary: Get public product detail
      operationId: productPublicGet
      description: |
        Returns an active parent style with variants, availableColors, and availableSizes.
        Ensures a `dupli1_guest` HttpOnly cookie and records a unique view (one count per
        guest × product). Response includes public `viewCount`. View-store failures do not
        fail the PDP.
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProduct'
          headers:
            Set-Cookie:
              description: Set when minting or replacing an invalid `dupli1_guest` cookie
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Products]
      summary: Update a product
      operationId: productUpdate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Updated product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Products]
      summary: Delete a product
      operationId: productDelete
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Product deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/{id}/recommendations:
    get:
      tags: [Products]
      summary: Related products for PDP
      operationId: productRecommendations
      description: |
        Returns ordered active parent product cards related to the seed id (seed excluded).
        Ranking uses same-category content similarity (brand, material, tags, price band)
        plus a soft `viewCount` boost. See docs/product-recommendations.md.
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 24
            default: 8
          description: Max items to return (clamped 1–24)
      responses:
        '200':
          description: Recommendation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/products:
    get:
      tags: [Products]
      summary: Search products
      operationId: productSearch
      description: |
        Returns parent styles only (no color duplicates).
        Public callers receive active parents only.
        Authenticated managers (`product_manager`, `admin`, `owner`) receive all statuses.
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Exact match (e.g. bags)
        - name: brand
          in: query
          schema:
            type: string
          description: Case-insensitive substring match
        - name: color
          in: query
          schema:
            type: string
          description: Parent has an active variant with this color
        - name: size
          in: query
          schema:
            type: string
          description: Parent has an active variant with this size
        - name: material
          in: query
          schema:
            type: string
          description: Exact match
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tags; product must include all
        - name: status
          in: query
          schema:
            type: string
          description: Exact match (managers only)
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Products]
      summary: Create a product
      operationId: productCreate
      security:
        - bearerAuth: []
      description: Auto-generates `id` from brand prefix if omitted. Defaults `status` to `active`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/{id}/images:
    post:
      tags: [Products]
      summary: Upload image to default variant
      operationId: productUploadImage
      security:
        - bearerAuth: []
      description: Multipart upload to the default variant. Prefer variant image upload for multi-color products.
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: Parent product with updated variants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/variants:
    get:
      tags: [Products]
      summary: Batch public variants by skuId
      operationId: productListVariantsBySkuIDs
      description: |
        Public batch lookup by canonical ULID `skuId`. Comma-separated `sku_ids` (max 50, deduped).
        Returns active variants whose parent products are also active. Unknown, draft/archived,
        or inactive-parent ids appear in `missing` (same visibility as single-variant lookups).
      parameters:
        - name: sku_ids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated canonical skuId values (max 50)
          example: "01HXYZ...,01HABC..."
      responses:
        '200':
          description: Batch result
          content:
            application/json:
              schema:
                type: object
                required: [items, missing]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Variant'
                  missing:
                    type: array
                    items:
                      type: string
                    description: Requested skuIds that were not publicly visible
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/variants/by-sku/{sku}:
    get:
      tags: [Products]
      summary: Public variant by human SKU
      operationId: productGetVariantBySKU
      parameters:
        - name: sku
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Variant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/variants/by-sku-id/{skuId}:
    get:
      tags: [Products]
      summary: Public variant by canonical skuId
      operationId: productGetVariantBySkuID
      parameters:
        - name: skuId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Variant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/variants/{sku}:
    get:
      tags: [Products]
      summary: Public variant by human SKU (legacy alias)
      deprecated: true
      operationId: productGetVariantBySKULegacy
      parameters:
        - name: sku
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Variant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/variants/by-sku-id/{skuId}:
    get:
      tags: [Products]
      summary: Public variant by canonical skuId (legacy alias)
      deprecated: true
      operationId: productGetVariantBySkuIDLegacy
      parameters:
        - name: skuId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Variant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/{id}/variants:
    post:
      tags: [Products]
      summary: Create a variant (SKU)
      operationId: productCreateVariant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VariantInput'
      responses:
        '201':
          description: Created variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Variant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/products/{id}/variants/{sku}:
    put:
      tags: [Products]
      summary: Update a variant
      operationId: productUpdateVariant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantSku'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VariantInput'
      responses:
        '200':
          description: Updated variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Variant'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Products]
      summary: Delete a variant
      operationId: productDeleteVariant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantSku'
      responses:
        '204':
          description: Variant deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/products/{id}/variants/{sku}/images:
    post:
      tags: [Products]
      summary: Upload a variant image
      operationId: productUploadVariantImage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/VariantSku'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: Variant with updated imageUrls
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Variant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/coupons/redeem:
    post:
      tags: [Coupons]
      summary: Redeem a coupon
      operationId: couponRedeem
      description: Validates an active coupon. Used by checkout/order service. Case-insensitive code lookup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  example: SUMMER30
      responses:
        '200':
          description: Valid coupon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Unknown or inactive coupon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/coupons:
    get:
      tags: [Coupons]
      summary: List all coupons
      operationId: couponList
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Coupon list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponSearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Coupons]
      summary: Create a coupon
      operationId: couponCreate
      security:
        - bearerAuth: []
      description: Code is normalized to uppercase. Coupons are stored in memory (not persisted).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CouponInput'
      responses:
        '201':
          description: Coupon created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Duplicate coupon code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/coupons/{code}:
    put:
      tags: [Coupons]
      summary: Update a coupon
      operationId: couponUpdate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CouponCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CouponUpdate'
      responses:
        '200':
          description: Updated coupon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Coupons]
      summary: Delete a coupon
      operationId: couponDelete
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CouponCode'
      responses:
        '204':
          description: Coupon deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from auth service refresh endpoint

  parameters:
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: BOT-001
    VariantSku:
      name: sku
      in: path
      required: true
      schema:
        type: string
      example: BOT-001-GRN
    CouponCode:
      name: code
      in: path
      required: true
      schema:
        type: string
      example: SUMMER30

  schemas:
    Settings:
      type: object
      required: [service, api_version]
      properties:
        service:
          type: string
          example: product
        api_version:
          type: string
          example: v1
        auth:
          type: object
          properties:
            mode:
              type: string
            jwks_configured:
              type: boolean
            jwt_secret_fallback:
              type: boolean
        storage:
          type: string
        features:
          type: object
          additionalProperties:
            type: boolean
        limits:
          type: object
          additionalProperties: true
        dependencies:
          type: object
          additionalProperties:
            type: object
            properties:
              configured:
                type: boolean
              host:
                type: string

    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: integer

    ProductStatus:
      type: string
      enum: [active, draft, archived]

    Product:
      type: object
      properties:
        id:
          type: string
          example: BOT-001
        name:
          type: string
        description:
          type: string
        sellingPrice:
          type: number
          format: double
          description: Official/display price (legacy mirror of cheapest active variant)
        price:
          type: number
          format: double
          description: Real sale price in KRW won (whole won; single storefront currency)
        brand:
          type: string
        brandCode:
          type: string
          description: Immutable 2–3 letter brand code (e.g. BOT). See product-sku-system.md.
        styleCode:
          type: string
          description: Immutable style code unique within brand (e.g. CAS001).
        color:
          type: string
        material:
          type: string
        stock:
          type: integer
        category:
          type: string
        status:
          $ref: '#/components/schemas/ProductStatus'
        imageUrls:
          type: array
          items:
            type: string
            format: uri
        capacity:
          type: string
        tags:
          type: array
          items:
            type: string
        viewCount:
          type: integer
          format: int64
          description: Unique guest PDP views (denormalized). Public on PDP and recommendations.
        createdAt:
          type: string
          format: date-time
        sellingPriceFrom:
          type: number
          format: double
          description: Official/display price of the cheapest active variant
        priceFrom:
          type: number
          format: double
          description: Real sale price (min active variant price)
        defaultImageUrl:
          type: string
        availableColors:
          type: array
          items:
            type: string
        availableSizes:
          type: array
          items:
            type: string
        variants:
          type: array
          items:
            $ref: '#/components/schemas/Variant'

    Variant:
      type: object
      required: [sku, productId, color, price, status]
      properties:
        skuId:
          type: string
          description: Canonical ULID identifier
        sku:
          type: string
          example: BOT_CAS001_BLK_V_MED
          description: Human SKU (Brand_Style_Color[_Edition]_Size). See product-sku-system.md.
        productId:
          type: string
          example: BOT-001
        color:
          type: string
        size:
          type: string
        colorCode:
          type: string
          example: BLK
        editionCode:
          type: string
          example: V
          description: Optional construction/edition (VariantCode segment)
        sizeCode:
          type: string
          example: MED
        sellingPrice:
          type: number
          format: double
          description: Official/display price (strikethrough / "was" price)
        price:
          type: number
          format: double
          description: Real sale price used for discount calculation
        status:
          $ref: '#/components/schemas/ProductStatus'
        imageUrls:
          type: array
          items:
            type: string
            format: uri
        createdAt:
          type: string
          format: date-time

    VariantInput:
      type: object
      properties:
        sku:
          type: string
          description: Optional; auto-composed from brand/style/color/edition/size codes when omitted
        color:
          type: string
        size:
          type: string
        colorCode:
          type: string
        editionCode:
          type: string
        sizeCode:
          type: string
        sellingPrice:
          type: number
          format: double
          description: Official/display price (strikethrough / "was" price)
        price:
          type: number
          format: double
          description: Real sale price used for discount calculation
        status:
          $ref: '#/components/schemas/ProductStatus'
        imageUrls:
          type: array
          items:
            type: string
            format: uri

    PublicProduct:
      description: Public product view
      allOf:
        - $ref: '#/components/schemas/Product'

    ProductInput:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        sellingPrice:
          type: number
          format: double
          description: Official/display price (legacy create seeds default variant)
        price:
          type: number
          format: double
          description: Real sale price used for discount calculation
        brand:
          type: string
        brandCode:
          type: string
          description: Optional; resolved from brand name when omitted
        styleCode:
          type: string
          description: Optional; derived from product id (e.g. BOT-001 → S001) when omitted
        color:
          type: string
        material:
          type: string
        stock:
          type: integer
        category:
          type: string
        status:
          $ref: '#/components/schemas/ProductStatus'
        imageUrls:
          type: array
          items:
            type: string
            format: uri
        capacity:
          type: string

    ProductSearchResponse:
      type: object
      required: [total, results]
      properties:
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/PublicProduct'

    RecommendationsResponse:
      type: object
      required: [seedId, items]
      properties:
        seedId:
          type: string
          description: Echo of the path product id
        items:
          type: array
          description: Ordered related parent cards (never null; empty when none)
          items:
            $ref: '#/components/schemas/PublicProduct'

    Coupon:
      type: object
      required: [code, discount, description, expires, active]
      properties:
        code:
          type: string
          example: SUMMER30
        discount:
          type: number
          format: double
          description: Fraction (0.30 = 30%)
          example: 0.30
        description:
          type: string
        expires:
          type: string
          example: Aug 31, 2026
        active:
          type: boolean

    CouponInput:
      type: object
      required: [code, discount]
      properties:
        code:
          type: string
        discount:
          type: number
          format: double
        description:
          type: string
        expires:
          type: string
        active:
          type: boolean
          default: true

    CouponUpdate:
      type: object
      properties:
        discount:
          type: number
          format: double
        description:
          type: string
        expires:
          type: string
        active:
          type: boolean

    CouponSearchResponse:
      type: object
      required: [total, results]
      properties:
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/Coupon'

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
