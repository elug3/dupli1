openapi: 3.0.3
info:
  title: Dupli1 Notification API
  version: v1
  description: |
    Private notification service API for the Dupli1 marketplace.

    Currently exposes health and settings endpoints. Outbound messaging is handled
    asynchronously via NATS event subscriptions (Telegram notifier) and is not
    part of this REST surface.

    **Gateway:** nginx proxies `/api/v1/notification/` in local Compose and ECS configs.

servers:
  - url: http://localhost:8080
    description: Local nginx gateway
  - url: http://localhost:8084
    description: Direct dupli1-notification service

tags:
  - name: Health
  - name: Settings

paths:
  /api/v1/notification/health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: notificationHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/notification/settings:
    get:
      tags: [Settings]
      summary: Non-secret service settings
      operationId: notificationSettings
      responses:
        '200':
          description: Safe operational settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    Settings:
      type: object
      required: [service, api_version]
      properties:
        service:
          type: string
          example: notification
        api_version:
          type: string
          example: v1
        features:
          type: object
          additionalProperties:
            type: boolean
        limits:
          type: object
          additionalProperties: true
        dependencies:
          type: object
          additionalProperties:
            type: object
            properties:
              configured:
                type: boolean
              host:
                type: string
          example: method not allowed
