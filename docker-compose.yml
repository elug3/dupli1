services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: schick
      POSTGRES_PASSWORD: schick_dev
      POSTGRES_DB: schick_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schick -d schick_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222"]
      interval: 5s
      timeout: 3s
      retries: 10

  schick-auth:
    build:
      context: .
      args:
        SERVICE: auth
    environment:
      DB_URL: postgres://schick:schick_dev@postgres:5432/schick_db?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      OWNER_EMAIL: ${OWNER_EMAIL:-admin@schick.co}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-Admin1234!}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  schick-product:
    build:
      context: .
      args:
        SERVICE: product
    command: ["-host", "0.0.0.0"]
    environment:
      DB_URL: postgres://schick:schick_dev@postgres:5432/products?sslmode=disable
      NATS_URL: nats://nats:4222
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  schick-inventory:
    build:
      context: .
      args:
        SERVICE: inventory
    environment:
      SCHICK_INVENTORY_ADDR: :8080
    ports:
      - "8082:8080"
    restart: unless-stopped

  schick-order:
    build:
      context: .
      args:
        SERVICE: order
    environment:
      SCHICK_ORDER_ADDR: :8080
      SCHICK_INVENTORY_URL: http://schick-inventory:8080
    ports:
      - "8083:8080"
    depends_on:
      - schick-inventory
    restart: unless-stopped

volumes:
  postgres_data:
