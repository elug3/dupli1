# LOCAL DEVELOPMENT ONLY
# This docker-compose file is intended for local testing.
# Production is deployed to AWS ECS — do not use this file for production.

services:
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dupli1_db
      POSTGRES_USER: dupli1
      POSTGRES_PASSWORD: dupli1_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dupli1 -d dupli1_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-product:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: products
      POSTGRES_USER: dupli1
      POSTGRES_PASSWORD: dupli1_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dupli1 -d products"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-dupli1}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-dupli1_dev}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-dupli1} ${MINIO_SECRET_KEY:-dupli1_dev} &&
        mc mb --ignore-existing local/product-images &&
        mc anonymous set download local/product-images
      "
    restart: "no"

  dupli1-auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth
    ports:
      - "18080:8080"
    environment:
      DB_URL: postgres://dupli1:dupli1_dev@postgres-auth:5432/dupli1_db?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-do-not-use-in-production}
      DUPLI1_AUTH_ADDR: :8080
      OWNER_EMAIL: admin@dupli1.com
      OWNER_PASSWORD: password
      DUPLI1_WEB_SERVICE_EMAIL: dupli1-web@internal.dupli1
      DUPLI1_WEB_SERVICE_PASSWORD: dupli1-web-dev-secret
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  dupli1-product:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: product
    ports:
      - "8081:8080"
    environment:
      DUPLI1_PRODUCT_DB: postgres://dupli1:dupli1_dev@postgres-product:5432/products?sslmode=disable
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-do-not-use-in-production}
      AUTH_JWKS_URL: http://dupli1-auth:8080/api/v1/auth/.well-known/jwks.json
      NATS_URL: nats://nats:4222
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-dupli1}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY:-dupli1_dev}
      S3_BUCKET: product-images
    depends_on:
      postgres-product:
        condition: service_healthy
      dupli1-auth:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/products/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  dupli1-inventory:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: inventory
    ports:
      - "8082:8080"
    environment:
      DUPLI1_INVENTORY_ADDR: :8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  dupli1-order:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: order
    ports:
      - "8083:8080"
    environment:
      DUPLI1_ORDER_ADDR: :8080
      DUPLI1_INVENTORY_URL: http://dupli1-inventory:8080
      DUPLI1_PRODUCT_URL: http://dupli1-product:8080
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-do-not-use-in-production}
      NATS_URL: nats://nats:4222
    depends_on:
      dupli1-inventory:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  dupli1-notification:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: notification
    ports:
      - "8084:8080"
    environment:
      DUPLI1_NOTIFICATION_ADDR: :8080
      NATS_URL: nats://nats:4222
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ORDER_CHAT_ID: ${TELEGRAM_ORDER_CHAT_ID:-}
      TELEGRAM_PRODUCT_CHAT_ID: ${TELEGRAM_PRODUCT_CHAT_ID:-}
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  dupli1-proxy:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:80"
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      dupli1-auth:
        condition: service_healthy
      dupli1-product:
        condition: service_healthy
      dupli1-inventory:
        condition: service_healthy
      dupli1-order:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-auth-data:
  postgres-product-data:
  minio-data:
